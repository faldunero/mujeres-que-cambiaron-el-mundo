<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Jugar - Mujeres que Cambiaron el Mundo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ludo-azul': '#0052D4',
                        'ludo-azul-dark': '#003B9F',
                        'ludo-cian': '#43C6AC',
                        'ludo-gris': '#F1F5F9',
                    },
                    fontFamily: {
                        'title': ['Montserrat', 'sans-serif'],
                        'body': ['Poppins', 'sans-serif'],
                        'sans': ['Poppins', 'sans-serif'],
                    },
                    backgroundImage: {
                        'ludo-gradient': 'linear-gradient(90deg, #0052D4 0%, #43C6AC 100%)',
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #F1F5F9; }
        h1, h2, h3, h4, .font-title { font-family: 'Montserrat', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .card-flip { animation: flip 0.5s ease-out; }
        @keyframes flip { 0% { transform: rotateY(90deg); opacity: 0; } 100% { transform: rotateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <!-- HEADER -->
    <div class="w-full bg-white border-b border-slate-100">
        <div class="max-w-[1400px] mx-auto h-[90px] flex items-center justify-between px-6">
            <a href="index.html" title="Salir de la partida y volver a explorar todas las cartas del mazo" class="text-slate-500 hover:text-ludo-azul text-sm font-medium transition-colors">
                ← Volver al mazo
            </a>
            <img src="logo/logotipo.svg" alt="Ludolab" class="h-7 opacity-80">
        </div>
    </div>

    <main class="max-w-[1100px] mx-auto p-6 md:p-10">

        <!-- VISTA 1: SELECCIÓN MODO -->
        <section id="vista-modo" class="fade-in">
            <div class="text-center mb-10">
                <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter uppercase text-slate-950 mb-4">A Jugar</h1>
                <p class="text-slate-500 text-lg font-medium">Elige cómo querés jugar</p>
            </div>
            <div class="grid md:grid-cols-2 gap-6 max-w-3xl mx-auto">
                <button onclick="elegirModo('individual')" class="bg-white border border-slate-200 hover:border-ludo-azul rounded-3xl p-10 text-left transition-colors">
                    <p class="text-xs font-medium text-slate-400 uppercase tracking-wider mb-3">Modo 01</p>
                    <h2 class="text-2xl font-semibold tracking-tight mb-3 text-slate-900">Individual</h2>
                    <p class="text-slate-500 font-normal leading-relaxed mb-6 text-sm">Modo práctica solo. Estudia las 60 cartas adivinando país, profesión e hito de cada mujer.</p>
                    <ul class="text-xs text-slate-400 space-y-1 font-normal mb-6">
                        <li>60 cartas en el mazo</li>
                        <li>Sin cartas de truco</li>
                        <li>Score personal al final</li>
                    </ul>
                    <span class="inline-flex items-center justify-center bg-ludo-cian text-white font-semibold py-2.5 px-5 rounded-full text-sm shadow-md shadow-ludo-cian/30">Empezar</span>
                </button>

                <button onclick="elegirModo('multi')" class="bg-white border border-slate-200 hover:border-ludo-azul rounded-3xl p-10 text-left transition-colors">
                    <p class="text-xs font-medium text-slate-400 uppercase tracking-wider mb-3">Modo 02</p>
                    <h2 class="text-2xl font-semibold tracking-tight mb-3 text-slate-900">Multijugador</h2>
                    <p class="text-slate-500 font-normal leading-relaxed mb-6 text-sm">2 a 5 jugadores se turnan el dispositivo. Incluye cartas de truco para voltear el juego.</p>
                    <ul class="text-xs text-slate-400 space-y-1 font-normal mb-6">
                        <li>60 cartas + 10 trucos</li>
                        <li>Censura, Exilio, Inspiración, Intercambio</li>
                        <li>Gana quien acumule más cartas</li>
                    </ul>
                    <span class="inline-flex items-center justify-center bg-ludo-cian text-white font-semibold py-2.5 px-5 rounded-full text-sm shadow-md shadow-ludo-cian/30">Empezar</span>
                </button>
            </div>
        </section>

        <!-- VISTA 2: SETUP JUGADORES (solo multi) -->
        <section id="vista-setup" class="hidden fade-in">
            <div class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter uppercase text-slate-950 mb-3">Jugadores</h1>
                <p class="text-slate-500 font-medium">¿Cuántos van a jugar?</p>
            </div>
            <div class="max-w-xl mx-auto bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                <div class="flex justify-center gap-3 mb-8">
                    <button onclick="setNumJugadores(2)" class="num-jug-btn w-12 h-12 rounded-full font-medium text-base transition-colors" data-n="2">2</button>
                    <button onclick="setNumJugadores(3)" class="num-jug-btn w-12 h-12 rounded-full font-medium text-base transition-colors" data-n="3">3</button>
                    <button onclick="setNumJugadores(4)" class="num-jug-btn w-12 h-12 rounded-full font-medium text-base transition-colors" data-n="4">4</button>
                    <button onclick="setNumJugadores(5)" class="num-jug-btn w-12 h-12 rounded-full font-medium text-base transition-colors" data-n="5">5</button>
                </div>

                <div id="inputs-jugadores" class="space-y-3 mb-8"></div>

                <div class="flex gap-3">
                    <button onclick="volverA('modo')" class="flex-1 bg-white border border-slate-200 hover:border-ludo-azul text-slate-900 font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Volver
                    </button>
                    <button id="btn-comenzar" onclick="comenzarPartida()" class="flex-1 bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Comenzar
                    </button>
                </div>
            </div>
        </section>

        <!-- VISTA 3: PARTIDA -->
        <section id="vista-partida" class="hidden fade-in">
            <!-- Score / Turno -->
            <div class="bg-white rounded-3xl border border-slate-200 p-6 md:p-8 mb-6 shadow-sm">
                <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <p id="turno-etiqueta" class="text-xs text-slate-400 font-medium uppercase tracking-wider">Turno actual</p>
                            <span id="fase-badge" class="hidden text-[10px] font-black uppercase tracking-widest text-white px-2 py-0.5 rounded-full" style="background-color:#43C6AC">Fase pozo</span>
                        </div>
                        <h2 id="turno-nombre" class="text-3xl font-black italic uppercase tracking-tighter text-slate-950">---</h2>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p id="mazo-etiqueta" class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Mazo</p>
                            <p id="mazo-count" class="text-2xl font-black tabular-nums text-slate-800">--</p>
                        </div>
                        <button onclick="verCartasPozo()" class="flex flex-col items-end bg-white border border-slate-200 hover:border-ludo-azul rounded-2xl px-4 py-2 transition-colors" title="Ver cartas del pozo">
                            <span class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-0.5">Pozo</span>
                            <span id="pozo-count" class="text-2xl font-black tabular-nums text-slate-800">0</span>
                        </button>
                    </div>
                </div>
                <div id="score-board" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Zona de acción principal -->
            <div id="zona-accion" class="bg-white rounded-3xl border border-slate-200 p-6 md:p-10 shadow-sm min-h-[480px]"></div>

            <div class="mt-6 flex justify-center">
                <button onclick="abandonar()" class="text-slate-400 hover:text-ludo-azul transition-colors text-sm font-medium">
                    Abandonar partida
                </button>
            </div>
        </section>

        <!-- VISTA 4: FIN DE PARTIDA -->
        <section id="vista-fin" class="hidden fade-in">
            <div class="text-center mb-10">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-wider mb-4">Resultados</p>
                <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter uppercase text-slate-950 mb-3">Fin del juego</h1>
                <p class="text-slate-500 text-lg font-medium">Estos son los resultados</p>
            </div>
            <div id="ranking-final" class="max-w-xl mx-auto space-y-3 mb-10"></div>
            <div class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                <button onclick="reiniciar()" class="flex-1 bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                    Jugar de nuevo
                </button>
                <a href="index.html" title="Vuelve a explorar las 60 cartas: descubre biografías completas, hitos históricos y aprende más sobre cada mujer" class="flex-1 text-center bg-white border border-slate-200 hover:border-ludo-azul text-slate-900 font-medium py-3 px-6 rounded-full text-sm transition-colors">
                    Explorar sus historias
                </a>
            </div>
        </section>

    </main>

    <!-- MODAL: Cartas del jugador -->
    <div id="modal-cartas" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm" onclick="if(event.target===this) cerrarModalCartas()">
        <div class="bg-white rounded-3xl shadow-2xl max-w-3xl w-full max-h-[85vh] overflow-hidden flex flex-col">
            <div class="flex items-center justify-between px-8 py-6 border-b border-slate-100">
                <div>
                    <p id="modal-cartas-etiqueta" class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Cartas</p>
                    <h3 id="modal-cartas-titulo" class="text-xl font-black italic uppercase tracking-tighter text-slate-950">---</h3>
                </div>
                <button onclick="cerrarModalCartas()" class="text-slate-400 hover:text-slate-900 transition-colors p-2" aria-label="Cerrar">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="modal-cartas-contenido" class="p-8 overflow-y-auto"></div>
            <div class="px-8 py-4 border-t border-slate-100 flex justify-end">
                <button onclick="cerrarModalCartas()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-2.5 px-5 rounded-full text-sm transition-colors">
                    Volver a la partida
                </button>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    // ESTADO DEL JUEGO
    // ============================================================
    const state = {
        modo: null,             // 'individual' | 'multi'
        numJugadores: 2,
        jugadores: [],          // [{nombre, cartas: [mujerObj, ...]}]
        turnoActual: 0,
        mazo: [],               // cartas pendientes (mezcla mujeres + trucos en multi)
        pozo: [],               // cartas descartadas
        cartaActual: null,      // carta en juego
        skipNext: false,        // flag Censura
        fasePozo: false,        // true cuando se agotó el mazo original y se juega con el pozo
        mujeresData: [],
        trucosData: []
    };

    // ============================================================
    // CARGA DE DATOS
    // ============================================================
    async function cargarDatos() {
        const [m, t] = await Promise.all([
            fetch('data/mujeres.json').then(r => r.json()),
            fetch('data/trucos.json').then(r => r.json())
        ]);
        state.mujeresData = m;
        state.trucosData = t;
    }

    // ============================================================
    // UTILS
    // ============================================================
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function mostrarVista(id) {
        ['vista-modo','vista-setup','vista-partida','vista-fin'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function volverA(vista) {
        mostrarVista('vista-' + vista);
    }

    // ============================================================
    // FLUJO: SELECCIÓN DE MODO
    // ============================================================
    function elegirModo(m) {
        state.modo = m;
        if (m === 'individual') {
            state.numJugadores = 1;
            state.jugadores = [{ nombre: 'Tú', cartas: [] }];
            iniciarMazo();
            mostrarVista('vista-partida');
            renderTurno();
        } else {
            setNumJugadores(2);
            mostrarVista('vista-setup');
        }
    }

    function setNumJugadores(n) {
        state.numJugadores = n;
        document.querySelectorAll('.num-jug-btn').forEach(b => {
            if (parseInt(b.dataset.n) === n) {
                b.className = 'num-jug-btn w-12 h-12 rounded-full font-medium text-base transition-colors bg-ludo-azul text-white';
            } else {
                b.className = 'num-jug-btn w-12 h-12 rounded-full font-medium text-base transition-colors bg-white border border-slate-200 hover:border-ludo-azul text-slate-900';
            }
        });
        const div = document.getElementById('inputs-jugadores');
        div.innerHTML = Array.from({length: n}, (_, i) => `
            <div class="flex items-center gap-3">
                <span class="w-8 h-8 rounded-full bg-ludo-cian/20 text-ludo-azul font-black text-sm flex items-center justify-center shrink-0">${i+1}</span>
                <input type="text" id="jug-${i}" placeholder="Jugador ${i+1}" value="Jugador ${i+1}"
                    class="flex-1 bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 font-bold text-slate-800 focus:ring-2 focus:ring-ludo-azul focus:bg-white outline-none transition-all">
            </div>
        `).join('');
    }

    function comenzarPartida() {
        state.jugadores = [];
        for (let i = 0; i < state.numJugadores; i++) {
            const v = document.getElementById('jug-' + i).value.trim() || ('Jugador ' + (i+1));
            state.jugadores.push({ nombre: v, cartas: [] });
        }
        iniciarMazo();
        mostrarVista('vista-partida');
        renderTurno();
    }

    function iniciarMazo() {
        const mujeres = state.mujeresData.map(m => ({ ...m, tipoCarta: 'mujer' }));
        if (state.modo === 'multi') {
            const trucos = state.trucosData.map(t => ({ ...t, tipoCarta: 'truco' }));
            state.mazo = shuffle([...mujeres, ...trucos]);
        } else {
            state.mazo = shuffle(mujeres);
        }
        state.pozo = [];
        state.turnoActual = 0;
        state.cartaActual = null;
        state.skipNext = false;
        state.fasePozo = false;
    }

    function iniciarFasePozo() {
        const mujeresEnPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
        // Las cartas de truco que quedaron en el pozo se descartan permanentemente.
        state.fasePozo = true;
        state.mazo = shuffle(mujeresEnPozo);
        state.pozo = [];
        state.cartaActual = null;
        state.preguntasEstado = null;
        state.skipNext = false;
        // Limpiar skipSiguiente de todos los jugadores: la fase pozo arranca limpia
        state.jugadores.forEach(j => { j.skipSiguiente = false; });

        document.getElementById('turno-nombre').innerText = state.jugadores[state.turnoActual].nombre;
        actualizarContadores();
        renderScoreBoard();
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="text-center py-12 fade-in">
                <p class="text-xs font-medium uppercase tracking-wider mb-3" style="color:#43C6AC">¡Se acabó el mazo!</p>
                <h3 class="text-3xl md:text-4xl font-black italic uppercase tracking-tighter mb-4 text-slate-950">Fase del pozo</h3>
                <p class="text-slate-600 font-medium mb-2 max-w-md mx-auto">La repesca es <b>opcional</b>: si la mesa quiere seguir, las <b>${state.mazo.length} carta${state.mazo.length === 1 ? '' : 's'}</b> del pozo entran a un nuevo mazo. Si prefieren cerrar la partida ahora, también pueden.</p>
                <div class="bg-ludo-gris rounded-2xl p-5 max-w-md mx-auto my-6 text-left">
                    <p class="text-xs font-bold text-ludo-azul uppercase tracking-widest mb-2">Reglas de la repesca</p>
                    <ul class="text-sm text-slate-700 font-medium space-y-1.5">
                        <li>· Basta con <b>1 acierto</b> para quedarte con la carta.</li>
                        <li>· Si fallas todo, la carta vuelve al pozo. Sin penalización.</li>
                        <li>· No hay opción riesgo ni turno extra.</li>
                        <li>· Las cartas de truco <b>no participan</b> (se descartan).</li>
                    </ul>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                    <button onclick="renderTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Comenzar repesca
                    </button>
                    <button onclick="saltarFasePozo()" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-3 px-6 rounded-full text-sm transition-colors" title="Termina la partida sin jugar la repesca. Gana quien tenga más cartas hasta ahora.">
                        Terminar partida ahora
                    </button>
                </div>
            </div>
        `;
    }

    function saltarFasePozo() {
        // Si la mesa decide no jugar la repesca, se cierra la partida con
        // los puntajes actuales. fasePozo queda en true para que el
        // contador siga mostrando "Repesca" si aún tuviera cartas, pero
        // el mazo se vacía para que mostrarFinPartida no haga nada raro.
        state.mazo = [];
        state.pozo = [];
        state.cartaActual = null;
        state.preguntasEstado = null;
        mostrarFinPartida();
    }

    // ============================================================
    // RENDERIZADO DEL TURNO
    // ============================================================
    function actualizarContadores() {
        const mazoEl = document.getElementById('mazo-count');
        const pozoEl = document.getElementById('pozo-count');
        if (mazoEl) mazoEl.innerText = state.mazo.length;
        if (pozoEl) pozoEl.innerText = state.pozo.length;
        // Mostrar/ocultar el badge de fase del pozo
        const badge = document.getElementById('fase-badge');
        const mazoEtiqueta = document.getElementById('mazo-etiqueta');
        if (badge) {
            if (state.fasePozo) {
                badge.classList.remove('hidden');
                if (mazoEtiqueta) mazoEtiqueta.innerText = 'Repesca';
            } else {
                badge.classList.add('hidden');
                if (mazoEtiqueta) mazoEtiqueta.innerText = 'Mazo';
            }
        }
    }

    function renderScoreBoard() {
        actualizarContadores();
        const sb = document.getElementById('score-board');
        sb.innerHTML = state.jugadores.map((j, i) => {
            const activo = i === state.turnoActual;
            return `
                <button onclick="verCartasJugador(${i})" class="flex items-center gap-2 px-4 py-2 rounded-full border transition-colors ${activo ? 'bg-ludo-azul border-ludo-azul text-white hover:bg-ludo-azul-dark' : 'bg-white border-slate-200 text-slate-600 hover:border-ludo-azul'}" title="Ver cartas de ${j.nombre}">
                    <span class="text-xs font-medium">${j.nombre}</span>
                    <span class="text-xs font-semibold tabular-nums ${activo ? 'bg-white/15' : 'bg-slate-100'} px-2 py-0.5 rounded-full">${j.cartas.length}</span>
                </button>
            `;
        }).join('');
    }

    function verCartasJugador(i) {
        const j = state.jugadores[i];
        const etiqueta = j.cartas.length === 1 ? '1 carta' : `${j.cartas.length} cartas`;
        abrirModalCartas({
            etiqueta: 'Cartas ganadas',
            titulo: `${j.nombre} · ${etiqueta}`,
            cartas: j.cartas,
            mensajeVacio: 'Este jugador aún no tiene cartas ganadas.'
        });
    }

    function verCartasPozo() {
        const cartasMujer = state.pozo.filter(c => c.tipoCarta === 'mujer');
        const trucos = state.pozo.filter(c => c.tipoCarta === 'truco');
        const etiqueta = state.pozo.length === 1 ? '1 carta' : `${state.pozo.length} cartas`;
        abrirModalCartas({
            etiqueta: 'Pozo',
            titulo: `Pozo · ${etiqueta}`,
            cartas: cartasMujer,
            trucos: trucos,
            mensajeVacio: 'El pozo está vacío.'
        });
    }

    function abrirModalCartas({ etiqueta, titulo, cartas, trucos, mensajeVacio }) {
        const modal = document.getElementById('modal-cartas');
        const contenido = document.getElementById('modal-cartas-contenido');
        const etiquetaEl = document.getElementById('modal-cartas-etiqueta');
        const tituloEl = document.getElementById('modal-cartas-titulo');
        etiquetaEl.innerText = etiqueta;
        tituloEl.innerText = titulo;
        const total = (cartas ? cartas.length : 0) + (trucos ? trucos.length : 0);
        if (total === 0) {
            contenido.innerHTML = `<p class="text-center text-slate-400 font-medium py-16">${mensajeVacio}</p>`;
        } else {
            const secciones = [];
            if (cartas && cartas.length > 0) {
                secciones.push(`
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${cartas.map(c => `
                            <div>
                                <img src="Set_Completo_60_Tarjetas_Mujeres/${c.id}.png" alt="${c.nombre}"
                                     class="rounded-xl w-full aspect-[2/3] object-cover shadow border border-slate-200 mb-2">
                                <p class="text-sm font-semibold text-slate-900 leading-tight">${c.nombre}</p>
                                <p class="text-xs text-slate-500 font-medium">${c.pais}</p>
                            </div>
                        `).join('')}
                    </div>
                `);
            }
            if (trucos && trucos.length > 0) {
                secciones.push(`
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mt-6 mb-3">Trucos usados</p>
                    <div class="grid grid-cols-3 md:grid-cols-5 gap-3">
                        ${trucos.map(t => `
                            <div>
                                <img src="Cartas_de_Truco_Estandarizadas/${t.id}.png" alt="${t.tipo}"
                                     class="rounded-xl w-full aspect-[2/3] object-cover shadow border border-slate-200 mb-2">
                                <p class="text-xs font-semibold text-slate-700">${t.tipo}</p>
                            </div>
                        `).join('')}
                    </div>
                `);
            }
            contenido.innerHTML = secciones.join('');
        }
        modal.classList.remove('hidden');
    }

    function cerrarModalCartas() {
        document.getElementById('modal-cartas').classList.add('hidden');
    }

    function renderTurno() {
        if (state.mazo.length === 0) {
            // Si es multi y aún no se ha hecho fase pozo, intentamos repesca
            if (state.modo === 'multi' && !state.fasePozo) {
                const mujeresEnPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
                if (mujeresEnPozo.length > 0) {
                    iniciarFasePozo();
                    return;
                }
            }
            mostrarFinPartida();
            return;
        }

        // Aplicar censura si corresponde
        if (state.skipNext) {
            state.skipNext = false;
            const saltado = state.jugadores[state.turnoActual];
            document.getElementById('turno-nombre').innerText = saltado.nombre;
            document.getElementById('mazo-count').innerText = state.mazo.length;
            renderScoreBoard();
            document.getElementById('zona-accion').innerHTML = `
                <div class="text-center py-12 fade-in">
                    <p class="text-xs font-medium text-rose-600 uppercase tracking-wider mb-4">Censura</p>
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-3">Turno perdido</h3>
                    <p class="text-slate-500 font-medium mb-8">
                        <span class="text-slate-900 font-semibold">${saltado.nombre}</span> pierde su turno por efecto de Censura.
                    </p>
                    <button onclick="siguienteTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Siguiente jugador
                    </button>
                </div>
            `;
            return;
        }

        const jug = state.jugadores[state.turnoActual];
        document.getElementById('turno-nombre').innerText = jug.nombre;
        document.getElementById('mazo-count').innerText = state.mazo.length;
        renderScoreBoard();

        document.getElementById('zona-accion').innerHTML = `
            <div class="text-center py-12 fade-in">
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-4">Es el turno de</p>
                <h3 class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter mb-8 text-slate-950">${jug.nombre}</h3>
                <button onclick="sacarCarta()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-8 rounded-full text-sm transition-colors">
                    Sacar carta
                </button>
                <p class="mt-8 text-xs text-slate-400 font-medium">${state.pozo.length} carta(s) en el pozo</p>
            </div>
        `;
    }

    function sacarCarta() {
        if (state.mazo.length === 0) {
            renderTurno();
            return;
        }
        const carta = state.mazo.shift();
        state.cartaActual = carta;
        actualizarContadores();
        if (carta.tipoCarta === 'truco') {
            mostrarTruco(carta);
        } else {
            mostrarMujer(carta);
        }
    }

    // ============================================================
    // FLUJO: CARTA DE MUJER (sistema honor)
    // ============================================================
    function mostrarMujer(m) {
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="grid md:grid-cols-2 gap-8 items-center card-flip">
                <div class="flex justify-center">
                    <img src="Set_Completo_60_Tarjetas_Mujeres/${m.id}.png" alt="${m.nombre}"
                         class="rounded-3xl shadow-2xl w-full max-w-[280px] aspect-[2/3] object-cover border border-slate-200">
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-2">Adivina 3 datos</p>
                    <h3 class="text-4xl font-black italic uppercase tracking-tighter mb-6 text-slate-950">${m.nombre}</h3>
                    <div id="preguntas-mujer" class="space-y-4"></div>
                </div>
            </div>
        `;
        state.aciertos = 0;
        state.preguntasEstado = { pais: null, prof: null, fama: null };
        renderPreguntas();
    }

    function renderPreguntas() {
        const m = state.cartaActual;
        const st = state.preguntasEstado;
        const preg = document.getElementById('preguntas-mujer');

        const row = (key, label, valor) => {
            const s = st[key];
            if (s === null) {
                return `
                    <div class="border border-slate-200 rounded-2xl p-4">
                        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-2">${label}</p>
                        <p class="text-slate-700 font-medium mb-3 text-sm">Dilo en voz alta. ¿Listo para ver la respuesta?</p>
                        <button onclick="revelarRespuesta('${key}')" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-2 px-5 rounded-full text-sm transition-colors">
                            Ver respuesta
                        </button>
                    </div>
                `;
            } else if (s === 'revelado') {
                return `
                    <div class="border border-slate-200 rounded-2xl p-4">
                        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-2">${label}</p>
                        <p class="text-slate-900 font-semibold text-lg mb-3">${valor}</p>
                        <div class="flex gap-2">
                            <button onclick="marcarPregunta('${key}', true)" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-full text-sm transition-colors">
                                Acerté
                            </button>
                            <button onclick="marcarPregunta('${key}', false)" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 px-4 rounded-full text-sm transition-colors">
                                Fallé
                            </button>
                        </div>
                    </div>
                `;
            } else {
                const ok = s === true;
                return `
                    <div class="border ${ok ? 'border-emerald-200 bg-emerald-50' : 'border-rose-200 bg-rose-50'} rounded-2xl p-4">
                        <p class="text-xs ${ok ? 'text-emerald-700' : 'text-rose-700'} font-medium uppercase tracking-wider mb-2">${label} · ${ok ? 'acertado' : 'fallido'}</p>
                        <p class="${ok ? 'text-emerald-900' : 'text-rose-900'} font-semibold">${valor}</p>
                    </div>
                `;
            }
        };

        preg.innerHTML =
            row('pais', 'País de origen', m.pais) +
            row('prof', 'Profesión / Área', m.prof) +
            row('fama', 'Hito o logro principal', m.fama);

        // Si ya respondió todas, mostrar resumen
        const todas = ['pais','prof','fama'].every(k => st[k] === true || st[k] === false);
        if (todas) {
            resolverTurnoMujer();
        }
    }

    function revelarRespuesta(key) {
        state.preguntasEstado[key] = 'revelado';
        renderPreguntas();
    }

    function marcarPregunta(key, acerto) {
        state.preguntasEstado[key] = acerto;
        if (acerto) state.aciertos = (state.aciertos || 0) + 1;
        renderPreguntas();
    }

    function resolverTurnoMujer() {
        const jug = state.jugadores[state.turnoActual];
        const m = state.cartaActual;
        const aciertos = ['pais','prof','fama'].filter(k => state.preguntasEstado[k] === true).length;

        let mensaje = '', accion = '', etiquetaFase = '';

        if (state.fasePozo) {
            // Reglas simplificadas en fase pozo: 1 acierto basta, sin riesgo ni turno extra
            etiquetaFase = `<p class="text-xs font-medium uppercase tracking-wider mb-2" style="color:#43C6AC">Fase del pozo</p>`;
            if (aciertos >= 1) {
                jug.cartas.push(m);
                const palabra = aciertos === 1 ? '1 acierto' : `${aciertos} aciertos`;
                mensaje = `<span class="text-emerald-600">${palabra}.</span> ${jug.nombre} se queda con la carta.`;
            } else {
                state.pozo.push(m);
                mensaje = `<span class="text-rose-600">0 aciertos.</span> La carta vuelve al pozo. Sin penalización.`;
            }
            accion = `<button onclick="siguienteTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">Siguiente jugador</button>`;
        } else if (aciertos === 3) {
            jug.cartas.push(m);
            mensaje = `<span class="text-emerald-600">3 aciertos.</span> ${jug.nombre} gana la carta y juega otro turno.`;
            accion = `<button onclick="turnoExtra()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">Seguir jugando</button>`;
        } else if (aciertos === 2) {
            jug.cartas.push(m);
            mensaje = `<span class="text-emerald-600">2 aciertos.</span> ${jug.nombre} gana la carta.`;
            accion = `<button onclick="siguienteTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">Siguiente jugador</button>`;
        } else if (aciertos === 1) {
            // Opción seguro vs riesgo
            mensaje = `<span class="text-amber-600">1 acierto.</span> ${jug.nombre} debe elegir:`;
            accion = `
                <div class="flex flex-col sm:flex-row gap-3 justify-center max-w-xl mx-auto">
                    <button onclick="opcionSeguro()" class="flex-1 bg-white border border-slate-200 hover:border-ludo-azul text-slate-900 font-medium py-3 px-6 rounded-2xl text-sm transition-colors text-left">
                        <span class="block font-semibold mb-1">Opción segura</span>
                        <span class="block text-xs text-slate-500 font-normal">Carta al pozo, termina turno</span>
                    </button>
                    <button onclick="opcionRiesgo()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-medium py-3 px-6 rounded-2xl text-sm transition-colors text-left">
                        <span class="block font-semibold mb-1">Opción riesgo</span>
                        <span class="block text-xs opacity-90 font-normal">Intenta uno que fallaste</span>
                    </button>
                </div>
            `;
        } else {
            state.pozo.push(m);
            mensaje = `<span class="text-rose-600">0 aciertos.</span> La carta va al pozo.`;
            accion = `<button onclick="siguienteTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">Siguiente jugador</button>`;
        }

        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="text-center py-6 fade-in">
                <div class="flex justify-center mb-6">
                    <img src="Set_Completo_60_Tarjetas_Mujeres/${m.id}.png" alt="${m.nombre}"
                         class="rounded-2xl shadow-xl w-40 aspect-[2/3] object-cover border border-slate-200">
                </div>
                ${etiquetaFase}
                <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">${m.nombre}</h3>
                <p class="text-slate-600 mb-8 text-lg font-medium">${mensaje}</p>
                ${accion}
            </div>
        `;
    }

    function opcionSeguro() {
        state.pozo.push(state.cartaActual);
        siguienteTurno();
    }

    function opcionRiesgo() {
        const m = state.cartaActual;
        const fallados = ['pais','prof','fama'].filter(k => state.preguntasEstado[k] === false);
        const jug = state.jugadores[state.turnoActual];
        const zona = document.getElementById('zona-accion');

    function intentarRiesgo(key) {

        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="text-center py-10 fade-in">
                <p class="text-xs text-amber-600 font-medium uppercase tracking-wider mb-3">Di tu respuesta en voz alta</p>
                <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-8">${labels[key]} de ${m.nombre}</h3>
                <button onclick="verRespuestaRiesgo('${key}')" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                    Ver respuesta
                </button>
            </div>
        `;
    }

    function verRespuestaRiesgo(key) {
        const m = state.cartaActual;
        const valor = m[key];
        const labels = { pais: 'País', prof: 'Profesión', fama: 'Hito' };
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="text-center py-10 fade-in">
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-3">${labels[key]} correcto</p>
                <p class="text-3xl font-black italic uppercase tracking-tighter mb-8 text-slate-950">${valor}</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="resolverRiesgo(true)" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Acerté
                    </button>
                    <button onclick="resolverRiesgo(false)" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Fallé
                    </button>
                </div>
            </div>
        `;
    }

    function resolverRiesgo(acerto) {
        const jug = state.jugadores[state.turnoActual];
        if (acerto) {
            jug.cartas.push(state.cartaActual);
        } else {
            state.pozo.push(state.cartaActual);
            // Pierde próximo turno: set skipNext para ESE jugador después del siguiente
            // Como convención: marcamos al jugador para saltar cuando vuelva a ser su turno
            jug.skipSiguiente = true;
        }
        siguienteTurno();
    }

    // ============================================================
    // FLUJO: CARTA DE TRUCO
    // ============================================================

        const zona = document.getElementById('zona-accion');
        const colorClass = t.estilo.includes('rose') ? 'text-rose-600'
            : t.estilo.includes('amber') ? 'text-amber-600'

        const puedeDesafio = cartasMujerPozo.length > 0;

            ? `<div class="flex flex-col sm:flex-row gap-3 justify-center max-w-xl mx-auto">
                    <button onclick="intentarDesafio()" class="bg-ludo-cian hover:opacity-90 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors shadow-md shadow-ludo-cian/30">

                    </button>
                    <button onclick="aplicarTruco()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Aplicar efecto directo
                    </button>
                </div>
                <p class="text-xs text-slate-400 mt-4 max-w-md mx-auto">Antes del truco podés recuperar una carta del pozo si aciertas su hito. Si fallás, el truco se aplica igual.</p>`
            : `<button onclick="aplicarTruco()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">

                </button>`;

        zona.innerHTML = `
            <div class="text-center py-6 fade-in">
                <div class="flex justify-center mb-6">
                    <img src="Cartas_de_Truco_Estandarizadas/${t.id}.png" alt="${t.tipo}"
                         class="rounded-3xl shadow-2xl w-48 aspect-[2/3] object-cover border border-slate-200">
                </div>
                <p class="text-xs font-medium uppercase tracking-wider mb-2 ${colorClass}">Carta de truco</p>
                <h3 class="text-4xl font-black italic uppercase tracking-tighter mb-2 text-slate-950">${t.tipo}</h3>
                <p class="text-slate-600 font-medium mb-8 max-w-md mx-auto">${t.efecto}</p>
                ${botonera}

    // ============================================================
    // DESAFÍO HISTÓRICO (regla opcional previa al truco)
    // ============================================================
    function intentarDesafio() {
        const cartasMujerPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="py-8 fade-in">
                <div class="text-center mb-6">
                    <p class="text-xs font-medium uppercase tracking-wider mb-2" style="color:#43C6AC">Desafío Histórico · Paso 1 de 2</p>
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-2">Elige una carta del pozo</h3>
                    <p class="text-slate-500 text-sm font-medium max-w-md mx-auto">Tendrás que decir en voz alta su hito o logro principal. Si aciertas, te la llevas como punto extra.</p>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-5 gap-3 max-h-[320px] overflow-y-auto p-1 mb-6">
                    ${cartasMujerPozo.map((c, idx) => `
                        <button onclick="elegirCartaDesafio(${idx})" class="group text-left">
                            <img src="Set_Completo_60_Tarjetas_Mujeres/${c.id}.png" alt="${c.nombre}"
                                 class="rounded-xl w-full aspect-[2/3] object-cover shadow border border-slate-200 group-hover:border-ludo-cian group-hover:shadow-lg transition-all mb-1">
                            <p class="text-xs font-semibold text-slate-700 leading-tight">${c.nombre}</p>
                            <p class="text-[10px] text-slate-400 font-medium">${c.pais}</p>

                        Cancelar y aplicar truco
                    </button>
                </div>
            </div>
        `;

    function cancelarDesafio() {
        state.desafioCarta = null;
        mostrarTruco(state.cartaActual);
    }

    function elegirCartaDesafio(idx) {
        const cartasMujerPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
        state.desafioCarta = cartasMujerPozo[idx];
        const c = state.desafioCarta;
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="py-10 text-center fade-in">
                <p class="text-xs font-medium uppercase tracking-wider mb-3" style="color:#43C6AC">Desafío Histórico · Paso 2 de 2</p>
                <div class="flex justify-center mb-6">
                    <img src="Set_Completo_60_Tarjetas_Mujeres/${c.id}.png" alt="${c.nombre}"
                         class="rounded-2xl shadow-xl w-40 aspect-[2/3] object-cover border border-slate-200">
                </div>
                <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">${c.nombre}</h3>
                <p class="text-slate-500 text-sm font-medium mb-6">${c.pais} · ${c.prof}</p>
                <p class="text-slate-700 font-medium mb-8 max-w-md mx-auto">Di en voz alta cuál es su <b>hito o logro principal</b>.</p>
                <button onclick="revelarHitoDesafio()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                    Ver respuesta
                </button>
            </div>
        `;
    }

    function revelarHitoDesafio() {
        const c = state.desafioCarta;
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="py-10 text-center fade-in">
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-3">Hito o logro principal de</p>
                <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-4 text-slate-950">${c.nombre}</h3>
                <p class="text-lg font-medium text-slate-700 mb-8 max-w-xl mx-auto">${c.fama}</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="resolverDesafio(true)" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Acerté
                    </button>
                    <button onclick="resolverDesafio(false)" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Fallé
                    </button>
                </div>
            </div>
        `;
    }

    function resolverDesafio(acerto) {
        const jug = state.jugadores[state.turnoActual];
        const c = state.desafioCarta;
        let mensaje;
        if (acerto) {
            const pIdx = state.pozo.indexOf(c);
            if (pIdx >= 0) state.pozo.splice(pIdx, 1);
            jug.cartas.push(c);
            mensaje = `<span class="text-emerald-600 font-semibold">¡Acertaste!</span> ${jug.nombre} recupera <b>${c.nombre}</b> como punto extra. Ahora se aplica el efecto del truco.`;
        } else {
            mensaje = `<span class="text-rose-600 font-semibold">Fallaste el desafío.</span> Se aplica el efecto del truco igual.`;
        }
        state.desafioCarta = null;
        actualizarContadores();
        renderScoreBoard();
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="py-10 text-center fade-in">
                <p class="text-xs font-medium uppercase tracking-wider mb-4" style="color:#43C6AC">Desafío Histórico</p>
                <p class="text-slate-700 font-medium text-lg mb-8 max-w-xl mx-auto">${mensaje}</p>
                <button onclick="aplicarTruco()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                    Aplicar efecto del truco
                </button>
            </div>
        `;
    }

    function aplicarTruco() {
        const t = state.cartaActual;
        const tipoKey = t.id.split('_')[2]; // censura | exilio | inspiracion | intercambio

        if (tipoKey === 'censura') {
            // Siguiente jugador pierde turno
            state.skipNext = true;
            state.pozo.push(t);
            finTurnoMensaje(`${t.tipo} aplicado. El siguiente jugador perderá su turno.`);
        } else if (tipoKey === 'inspiracion') {
            state.pozo.push(t);
            actualizarContadores();
            // Mismo jugador saca la siguiente carta del mazo inmediatamente
            const zona = document.getElementById('zona-accion');
            if (state.mazo.length === 0) {
                zona.innerHTML = `
                    <div class="text-center py-12 fade-in">
                        <p class="text-xs text-emerald-600 font-medium uppercase tracking-wider mb-4">Inspiración</p>
                        <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-3">Mazo vacío</h3>
                        <p class="text-slate-600 mb-8 font-medium">Ya no quedan cartas en el mazo. Terminá el turno.</p>
                        <button onclick="siguienteTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                            Siguiente jugador
                        </button>
                    </div>
                `;
                return;
            }
            zona.innerHTML = `
                <div class="text-center py-12 fade-in">
                    <p class="text-xs text-emerald-600 font-medium uppercase tracking-wider mb-4">Inspiración</p>
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-3">Jugá otra vez</h3>
                    <p class="text-slate-600 mb-8 font-medium max-w-md mx-auto">${state.jugadores[state.turnoActual].nombre} toma la siguiente carta del mazo (${state.mazo.length} restante${state.mazo.length === 1 ? '' : 's'}) y juega un turno inmediato.</p>
                    <button onclick="sacarCarta()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Revelar siguiente carta del mazo
                    </button>
                </div>
            `;
        } else if (tipoKey === 'exilio') {
            state.pozo.push(t);
            // Elegir oponente con cartas ganadas
            const jugI = state.turnoActual;
            const opciones = state.jugadores
                .map((j, i) => ({ j, i }))
                .filter(o => o.i !== jugI && o.j.cartas.length > 0);
            if (opciones.length === 0) {
                finTurnoMensaje(`${t.tipo}: ningún oponente tiene cartas ganadas. El efecto se descarta.`);
                return;
            }
            const zona = document.getElementById('zona-accion');
            zona.innerHTML = `
                <div class="text-center py-10 fade-in">
                    <p class="text-xs text-amber-600 font-medium uppercase tracking-wider mb-4">Exilio</p>
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-3">Exilio de puntos</h3>
                    <p class="text-slate-600 mb-8 font-medium">${state.jugadores[jugI].nombre}, elige a un oponente. Deberá devolver 1 carta ganada al pozo.</p>
                    <div class="flex flex-wrap gap-3 justify-center">
                        ${opciones.map(o => `
                            <button onclick="exiliarOponente(${o.i})" class="bg-amber-500 hover:bg-amber-600 text-white font-medium py-2.5 px-5 rounded-full text-sm transition-colors">
                                ${o.j.nombre} (${o.j.cartas.length})
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        } else if (tipoKey === 'intercambio') {
            state.pozo.push(t);
            const jug = state.jugadores[state.turnoActual];
            const cartasMujerPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
            if (jug.cartas.length === 0 || cartasMujerPozo.length < 2) {
                finTurnoMensaje(`${t.tipo}: no hay condiciones para intercambiar (necesitas 1 carta ganada y 2+ en pozo). Se descarta.`);
                return;
            }
            state.intercambioEntregarIdx = null;
            mostrarIntercambioEntregar();
        }
    }

    function mostrarIntercambioEntregar() {
        const jug = state.jugadores[state.turnoActual];
        const sel = state.intercambioEntregarIdx;
        const listo = sel !== null && sel !== undefined;
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="py-8 fade-in">
                <div class="text-center mb-6">
                    <p class="text-xs text-sky-600 font-medium uppercase tracking-wider mb-3">Intercambio · Paso 1 de 2</p>
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-2">Elige qué carta entregar</h3>
                    <p class="text-slate-500 text-sm font-medium max-w-md mx-auto">Selecciona UNA de tus cartas ganadas para enviar al pozo. Después vas a elegir 2 del pozo para llevarte.</p>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-5 gap-3 max-h-[280px] overflow-y-auto p-1 mb-6">
                    ${jug.cartas.map((c, idx) => {
                        const seleccionada = idx === sel;
                        return `
                            <button onclick="intercambioSeleccionarPropia(${idx})" class="relative">
                                <img src="Set_Completo_60_Tarjetas_Mujeres/${c.id}.png" alt="${c.nombre}"
                                     class="rounded-xl w-full aspect-[2/3] object-cover shadow border transition-all ${seleccionada ? 'border-sky-600 ring-4 ring-sky-300' : 'border-slate-200 hover:border-ludo-azul'}">
                                ${seleccionada ? `<span class="absolute inset-0 bg-sky-600/25 rounded-xl"></span>` : ''}
                            </button>
                        `;
                    }).join('')}
                </div>
                <div class="flex justify-center">
                    <button onclick="intercambioConfirmarEntrega()" ${listo ? '' : 'disabled'}
                            class="${listo ? 'bg-ludo-azul hover:bg-ludo-azul-dark text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'} font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Entregar y continuar
                    </button>
                </div>
            </div>
        `;
    }

    function intercambioSeleccionarPropia(idx) {
        state.intercambioEntregarIdx = (state.intercambioEntregarIdx === idx) ? null : idx;
        mostrarIntercambioEntregar();
    }

    function intercambioConfirmarEntrega() {
        const idx = state.intercambioEntregarIdx;
        if (idx === null || idx === undefined) return;
        intercambioEntregar(idx);
        state.intercambioEntregarIdx = null;
    }

    function exiliarOponente(oponenteI) {
        state.exilioOponente = oponenteI;
        const op = state.jugadores[oponenteI];
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="py-8 fade-in">
                <div class="text-center mb-6">
                    <p class="text-xs text-amber-600 font-medium uppercase tracking-wider mb-2">Exilio</p>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">${op.nombre}, elige qué carta devolver al pozo</h3>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-5 gap-3 max-h-[320px] overflow-y-auto p-1">
                    ${op.cartas.map((c, idx) => `
                        <button onclick="entregarExilio(${idx})" class="group">
                            <img src="Set_Completo_60_Tarjetas_Mujeres/${c.id}.png" alt="${c.nombre}"
                                 class="rounded-xl w-full aspect-[2/3] object-cover shadow border border-slate-200 group-hover:border-amber-500 group-hover:shadow-lg transition-all">
                        </button>
                    `).join('')}
                </div>
            </div>
        `;
    }


    function entregarExilio(cartaIdx) {
        const op = state.jugadores[state.exilioOponente];
        const carta = op.cartas.splice(cartaIdx, 1)[0];
        state.pozo.push(carta);
        state.exilioOponente = null;
        finTurnoMensaje(`${op.nombre} pierde "${carta.nombre}". La carta va al pozo.`);
    }

    function intercambioEntregar(cartaIdx) {
        const jug = state.jugadores[state.turnoActual];
        const carta = jug.cartas.splice(cartaIdx, 1)[0];
        state.pozo.push(carta);
        // Ahora elegir 2 del pozo
        state.intercambioElegidas = [];
        mostrarIntercambioElegirPozo();
    }

    function mostrarIntercambioElegirPozo() {
        const cartasMujerPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
        const elegidas = state.intercambioElegidas || [];
        const zona = document.getElementById('zona-accion');
        const listo = elegidas.length === 2;
        zona.innerHTML = `
            <div class="py-8 fade-in">
                <div class="text-center mb-6">
                    <p class="text-xs text-sky-600 font-medium uppercase tracking-wider mb-2">Intercambio · Paso 2 de 2</p>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Elige 2 cartas del pozo</h3>
                    <p class="text-slate-500 text-sm font-medium">Toca una carta para seleccionarla. Toca otra vez para deseleccionar.</p>
                    <p class="mt-2 text-slate-900 font-semibold">Seleccionadas: ${elegidas.length} / 2</p>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-5 gap-3 max-h-[320px] overflow-y-auto p-1 mb-6">
                    ${cartasMujerPozo.map((c, idx) => {
                        const orden = elegidas.indexOf(idx);
                        const seleccionada = orden >= 0;
                        return `
                            <button onclick="intercambioElegirCarta(${idx})" class="relative">
                                <img src="Set_Completo_60_Tarjetas_Mujeres/${c.id}.png" alt="${c.nombre}"
                                     class="rounded-xl w-full aspect-[2/3] object-cover shadow border transition-all ${seleccionada ? 'border-sky-600 ring-4 ring-sky-300' : 'border-slate-200 hover:border-ludo-azul'}">
                                ${seleccionada ? `
                                    <span class="absolute inset-0 bg-sky-600/25 rounded-xl"></span>
                                    <span class="absolute top-2 left-2 bg-sky-600 text-white font-semibold text-sm w-7 h-7 rounded-full flex items-center justify-center shadow-lg">${orden + 1}</span>
                                ` : ''}
                            </button>
                        `;
                    }).join('')}
                </div>
                <div class="flex justify-center">
                    <button onclick="intercambioConfirmar()" ${listo ? '' : 'disabled'}
                            class="${listo ? 'bg-ludo-azul hover:bg-ludo-azul-dark text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'} font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Confirmar intercambio
                    </button>
                </div>
            </div>
        `;
    }

    function intercambioElegirCarta(idx) {
        const elegidas = state.intercambioElegidas || [];
        const pos = elegidas.indexOf(idx);
        if (pos >= 0) {
            elegidas.splice(pos, 1);
        } else {
            if (elegidas.length >= 2) return;
            elegidas.push(idx);
        }
        state.intercambioElegidas = elegidas;
        mostrarIntercambioElegirPozo();
    }

    function intercambioConfirmar() {
        const elegidas = state.intercambioElegidas || [];
        if (elegidas.length !== 2) return;
        const jug = state.jugadores[state.turnoActual];
        const cartasMujerPozo = state.pozo.filter(c => c.tipoCarta === 'mujer');
        const aTomar = elegidas.map(i => cartasMujerPozo[i]);
        aTomar.forEach(c => {
            const pIdx = state.pozo.indexOf(c);
            if (pIdx >= 0) state.pozo.splice(pIdx, 1);
            jug.cartas.push(c);
        });
        state.intercambioElegidas = null;
        finTurnoMensaje(`Intercambio completado: ${jug.nombre} gana 2 cartas del pozo.`);
    }

    function finTurnoMensaje(msg) {
        const zona = document.getElementById('zona-accion');
        zona.innerHTML = `
            <div class="text-center py-12 fade-in">
                <p class="text-slate-700 font-medium text-lg mb-8 max-w-xl mx-auto">${msg}</p>
                <button onclick="siguienteTurno()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                    Siguiente jugador
                </button>
            </div>
        `;
    }

    // ============================================================
    // FLUJO DE TURNOS
    // ============================================================
    function turnoExtra() {
        state.cartaActual = null;
        state.preguntasEstado = null;
        renderTurno();
    }

    function siguienteTurno() {
        state.cartaActual = null;
        state.preguntasEstado = null;
        state.turnoActual = (state.turnoActual + 1) % state.numJugadores;

        // Si el próximo jugador tiene skipSiguiente por opción riesgo fallida, consumimos el flag y saltamos
        const prox = state.jugadores[state.turnoActual];
        if (prox.skipSiguiente) {
            prox.skipSiguiente = false;
            const zona = document.getElementById('zona-accion');
            document.getElementById('turno-nombre').innerText = prox.nombre;
            document.getElementById('mazo-count').innerText = state.mazo.length;
            renderScoreBoard();
            zona.innerHTML = `
                <div class="text-center py-12 fade-in">
                    <p class="text-xs font-medium text-amber-600 uppercase tracking-wider mb-4">Riesgo fallado</p>
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-3">Turno salteado</h3>
                    <p class="text-slate-500 font-medium mb-8">
                        <span class="text-slate-900 font-semibold">${prox.nombre}</span> pierde el turno por el riesgo fallado anterior.
                    </p>
                    <button onclick="avanzarTrasSkipRiesgo()" class="bg-ludo-azul hover:bg-ludo-azul-dark text-white font-medium py-3 px-6 rounded-full text-sm transition-colors">
                        Continuar
                    </button>
                </div>
            `;
            return;
        }
        renderTurno();
    }

    function avanzarTrasSkipRiesgo() {
        state.turnoActual = (state.turnoActual + 1) % state.numJugadores;
        renderTurno();
    }

    // ============================================================
    // FIN DE PARTIDA
    // ============================================================
    function mostrarFinPartida() {
        mostrarVista('vista-fin');
        const ordenados = [...state.jugadores].sort((a,b) => b.cartas.length - a.cartas.length);
        const ganador = ordenados[0];
        const div = document.getElementById('ranking-final');
        div.innerHTML = ordenados.map((j, i) => {
            const pos = i + 1;
            const destacado = j === ganador;
            return `
                <div class="flex items-center justify-between p-5 rounded-2xl ${destacado ? 'bg-ludo-azul text-white' : 'bg-white border border-slate-200'}">
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-medium ${destacado ? 'text-white/60' : 'text-slate-400'} tabular-nums">${String(pos).padStart(2, '0')}</span>
                        <span class="font-black italic uppercase tracking-tighter text-xl ${destacado ? '' : 'text-slate-950'}">${j.nombre}</span>
                    </div>
                    <span class="font-semibold tabular-nums text-lg ${destacado ? 'bg-white/15 px-4 py-1 rounded-full' : 'text-slate-500'}">${j.cartas.length} carta${j.cartas.length === 1 ? '' : 's'}</span>
                </div>
            `;
        }).join('');
    }

    function reiniciar() {
        state.modo = null;
        state.jugadores = [];
        state.turnoActual = 0;
        state.mazo = [];
        state.pozo = [];
        state.cartaActual = null;
        state.skipNext = false;
        state.fasePozo = false;
        state.preguntasEstado = null;
        state.desafioCarta = null;
        state.intercambioElegidas = null;
        state.intercambioEntregarIdx = null;
        state.exilioOponente = null;
        mostrarVista('vista-modo');
    }

    function abandonar() {
        if (confirm('¿Abandonar la partida actual? Se perderá el progreso.')) {
            reiniciar();
        }
    }

    // ============================================================
    // INIT
    // ============================================================
    cargarDatos().then(() => {
        mostrarVista('vista-modo');
    }).catch(err => {
        console.error('Error cargando datos:', err);
        document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:Inter,sans-serif"><h1>Error</h1><p>No se pudo cargar data/mujeres.json o data/trucos.json.</p><a href="index.html">← Volver al mazo</a></div>';
    });
    </script>

    <footer class="max-w-[1100px] mx-auto px-6 md:px-10 py-10 border-t border-slate-200 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest order-2 md:order-1">Donde la curiosidad se convierte en conocimiento</p>
        <a href="https://ludolab.cl" target="_blank" title="Ir a ludolab.cl" class="hover:opacity-80 transition-opacity order-1 md:order-2">
            <img src="logo/logotipo.svg" alt="Ludolab.cl" class="h-8">
        </a>
    </footer>
</body>
</html>
